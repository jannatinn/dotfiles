set-option -g mouse on

unbind C-b
set -g prefix C-t
bind C-t send-prefix

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind '"' split-window -h
bind % split-window -v

set-option -s default-terminal "screen-256color"
set-option -as terminal-features ",xterm-256color:RGB"

set-option -g status-keys emacs
set-option -g focus-events on

set-window-option -g aggressive-resize on

set-option -s escape-time 0
set-option -g history-limit 1000000
set-option -g display-time 4000

set -g status-justify left
set -g status-interval 5
set -g status-position bottom

# Color palette (Gruvbox Dark)
# bg0: #282828  |  bg1: #3c3836  |  fg: #ebdbb2  |  yellow: #fabd2f  |  gray: #928374
set -g status-style "bg=#282828,fg=#ebdbb2"
set -g status-left-length 0
set -g status-left ""
set -g status-right-length 128
set -g status-right "#[fg=#282828,bg=#fabd2f,bold] #S "
setw -g window-status-activity-style "fg=#ebdbb2,bg=#282828"
setw -g window-status-format "#[fg=#928374,bg=#282828] #I:#W "
setw -g window-status-current-format "#[fg=#ebdbb2,bg=#3c3836,bold] #I:#W "
set -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#fabd2f"

run '$(brew --prefix)/opt/tpm/share/tpm/tpm'
set -g @plugin 'tmux-plugins/tpm'
